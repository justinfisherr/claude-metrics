<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jazz Facts</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 100%);
            color: #e0e0e0;
            font-family: 'Segoe UI', 'Helvetica Neue', 'Georgia', serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            font-size: 16px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 2.5em;
            font-weight: 300;
            letter-spacing: 2px;
            color: #ffd700;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .header p {
            font-size: 0.95em;
            color: #a0a0a0;
            letter-spacing: 1px;
        }

        .fact-card {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 1px solid #333;
            border-radius: 15px;
            padding: 40px 30px;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .fact-card:hover {
            border-color: #ffd700;
            box-shadow: 0 12px 40px rgba(255, 215, 0, 0.1);
        }

        .fact-title {
            font-size: 1.6em;
            font-weight: 400;
            color: #ffd700;
            margin-bottom: 25px;
            line-height: 1.3;
            letter-spacing: 0.5px;
        }

        .fact-text {
            font-size: 1.1em;
            line-height: 1.8;
            color: #d0d0d0;
            margin-bottom: 30px;
            font-weight: 300;
            letter-spacing: 0.3px;
        }

        .fact-counter {
            font-size: 0.9em;
            color: #888;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #333;
        }

        .buttons {
            display: flex;
            gap: 12px;
            flex-direction: column;
        }

        .btn-row {
            display: flex;
            gap: 12px;
            justify-content: space-between;
        }

        button {
            padding: 15px 30px;
            font-size: 1em;
            font-weight: 500;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: 'Segoe UI', sans-serif;
        }

        .btn-next {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            color: #0f0f1e;
            flex: 1;
            font-weight: 600;
        }

        .btn-next:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.3);
        }

        .btn-next:active {
            transform: translateY(0);
        }

        .btn-reset {
            background: rgba(255, 100, 100, 0.2);
            color: #ff6464;
            border: 1px solid #ff6464;
            flex: 1;
        }

        .btn-reset:hover {
            background: rgba(255, 100, 100, 0.3);
            transform: translateY(-2px);
        }

        .stats {
            text-align: center;
            padding: 15px;
            background: rgba(255, 215, 0, 0.05);
            border-radius: 10px;
            border: 1px solid rgba(255, 215, 0, 0.1);
        }

        .stats p {
            font-size: 0.95em;
            color: #a0a0a0;
            margin: 5px 0;
        }

        .stats-highlight {
            color: #ffd700;
            font-weight: 600;
        }

        .read-indicator {
            display: inline-block;
            font-size: 0.85em;
            color: #888;
            margin-top: 15px;
        }

        @media (max-width: 480px) {
            body {
                padding: 15px;
            }

            .header h1 {
                font-size: 2em;
            }

            .fact-card {
                padding: 30px 20px;
                min-height: 350px;
            }

            .fact-title {
                font-size: 1.4em;
                margin-bottom: 20px;
            }

            .fact-text {
                font-size: 1em;
                line-height: 1.7;
            }

            button {
                padding: 12px 24px;
                font-size: 0.9em;
            }
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Jazz Facts</h1>
            <p>Random wisdom about jazz's greatest musicians</p>
        </div>

        <div class="fact-card" id="factCard">
            <div>
                <div class="fact-title" id="factTitle">Loading...</div>
                <div class="fact-text" id="factText">Discovering a random jazz fact...</div>
                <div class="read-indicator" id="readIndicator"></div>
            </div>
            <div class="fact-counter" id="factCounter"></div>
        </div>

        <div class="stats" id="stats">
            <p>You've read <span class="stats-highlight" id="readCount">0</span> of <span class="stats-highlight" id="totalCount">40</span> facts</p>
        </div>

        <div class="buttons">
            <div class="btn-row">
                <button class="btn-next" onclick="nextFact()">Next Fact →</button>
                <button class="btn-reset" onclick="resetCache()">Reset</button>
            </div>
        </div>
    </div>

    <script>
        let allFacts = [];
        let readFacts = new Set();
        let currentFactId = null;

        // Load facts from JSON
        async function loadFacts() {
            try {
                const response = await fetch('jazz-facts.json');
                const data = await response.json();
                allFacts = data.facts;
                loadReadFacts();
                displayFact();
            } catch (error) {
                console.error('Error loading facts:', error);
                document.getElementById('factCard').innerHTML = '<p>Error loading facts. Make sure jazz-facts.json is in the same directory.</p>';
            }
        }

        function loadReadFacts() {
            const stored = localStorage.getItem('jazzFactsRead');
            if (stored) {
                readFacts = new Set(JSON.parse(stored));
            }
        }

        function saveReadFacts() {
            localStorage.setItem('jazzFactsRead', JSON.stringify(Array.from(readFacts)));
        }

        function getRandomFact() {
            if (allFacts.length === 0) return null;
            const randomIndex = Math.floor(Math.random() * allFacts.length);
            return allFacts[randomIndex];
        }

        function displayFact() {
            const fact = getRandomFact();
            if (!fact) return;

            currentFactId = fact.id;
            readFacts.add(fact.id);
            saveReadFacts();

            const card = document.getElementById('factCard');
            card.classList.remove('fade-in');
            
            setTimeout(() => {
                document.getElementById('factTitle').textContent = fact.title;
                document.getElementById('factText').textContent = fact.fact;
                document.getElementById('factCounter').innerHTML = 
                    `<strong>Fact ${fact.id}</strong> of 40`;
                
                const isRead = readFacts.has(fact.id);
                const indicator = document.getElementById('readIndicator');
                indicator.textContent = isRead ? '✓ Already read' : 'New fact';
                indicator.style.color = isRead ? '#888' : '#ffd700';

                updateStats();
                card.classList.add('fade-in');
            }, 100);
        }

        function nextFact() {
            displayFact();
        }

        function resetCache() {
            if (confirm('Clear all read facts? You\'ll see stats reset to 0/40.')) {
                readFacts.clear();
                localStorage.removeItem('jazzFactsRead');
                updateStats();
                displayFact();
            }
        }

        function updateStats() {
            document.getElementById('readCount').textContent = readFacts.size;
            document.getElementById('totalCount').textContent = allFacts.length;
        }

        // Initialize on page load
        window.addEventListener('DOMContentLoaded', loadFacts);
    </script>
</body>
</html>
